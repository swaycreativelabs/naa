<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="ad.size" content="width=300,height=250" />
<title>ORF — Here &amp; There For You — 300x250</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet" />
<style>
  :root{--navy:#0E374D;--green:#A1CE5E;--blue:#238DC1;--white:#fff;--sans:"Montserrat",Arial,sans-serif;}
  *{margin:0;padding:0;box-sizing:border-box;}
  .banner{position:relative;width:300px;height:250px;overflow:hidden;background:var(--navy);font-family:var(--sans);cursor:pointer;}
  .banner a{display:block;width:100%;height:100%;text-decoration:none;}

  .bg-gradient{position:absolute;inset:0;
    background:radial-gradient(90% 90% at 0% 0%, rgba(37,140,192,.45) 0%, rgba(37,140,192,0) 55%),
      linear-gradient(150deg,#0E374D 42%,#09303f 100%);}

  .line{position:absolute;pointer-events:none;will-change:transform;}
  .line-top{left:10px;top:0;width:41px;height:41px;animation:drift-a 19s linear infinite alternate;}
  .line-b1{left:254px;top:84px;width:102px;height:102px;animation:drift-b 13s linear infinite alternate;}
  .line-b2{left:283px;top:77px;width:103px;height:102px;animation:drift-c 27s linear infinite alternate;}
  @keyframes drift-a{from{transform:translate(-35px,35px);}   to{transform:translate(90px,-90px);}}
  @keyframes drift-b{from{transform:translate(-90px,90px);}   to{transform:translate(80px,-80px);}}
  @keyframes drift-c{from{transform:translate(-50px,50px) rotate(180deg);} to{transform:translate(100px,-100px) rotate(180deg);}}
  @media (prefers-reduced-motion:reduce){.line,.frame-photo{animation:none!important;}}

  /* frames: full-bleed image + headline; end card image + stacked lockup */
  .frame{position:absolute;inset:0;opacity:0;transition:opacity .6s ease-in-out;pointer-events:none;}
  .frame.active{opacity:1;}
  /* photo: full-bleed, but top-left + bottom-right corners chamfered at 45°
     so the navy bg shows through as the diagonal blue borders */
  .frame-img{position:absolute;inset:0;overflow:hidden;
    -webkit-clip-path:polygon(140px 0,100% 0,100% calc(100% - 140px),calc(100% - 140px) 100%,0 100%,0 140px);
    clip-path:polygon(140px 0,100% 0,100% calc(100% - 140px),calc(100% - 140px) 100%,0 100%,0 140px);}
  .frame-photo{position:absolute;inset:0;background-repeat:no-repeat;background-size:cover;
    transform:scale(1);transform-origin:50% 50%;}
  .frame.active .frame-photo{animation:kenburns 2.2s linear forwards;}
  @keyframes kenburns{from{transform:scale(1.05);}to{transform:scale(1);}}
  /* light legibility wash where text sits over the photo (not the navy corners) */
  .frame-img::after{content:"";position:absolute;inset:0;background:
    linear-gradient(125deg, rgba(14,55,77,.6) 0%, rgba(14,55,77,0) 40%),
    linear-gradient(0deg, rgba(14,55,77,.5) 0%, rgba(14,55,77,0) 22%);}

  .headline{position:absolute;left:15px;top:32px;width:140px;
    font-weight:600;font-size:28px;line-height:1.08;letter-spacing:-1.1px;color:var(--white);
    text-shadow:0 4px 10px rgba(0,0,0,.25);}
  .headline .grad{background:linear-gradient(116deg,#A1CD5D 45%,#2DAFF3 78%);
    -webkit-background-clip:text;background-clip:text;color:transparent;}
  .headline .nb{white-space:nowrap;}

  .lockup{position:absolute;left:16px;top:34px;width:136px;height:126px;}

  .cta{position:absolute;left:16px;top:200px;width:115px;height:33px;
    background:var(--green);border-radius:33px;display:flex;align-items:center;justify-content:center;
    font-weight:700;font-size:14px;color:var(--navy);box-shadow:0 3px 4px rgba(0,0,0,.25);white-space:nowrap;z-index:5;
    transition:background-color .2s ease;}
  .banner:hover .cta{background:var(--white);}

  /* compact ORF mark */
  .logo{position:absolute;left:213px;top:197px;width:72.2px;height:35.8px;z-index:5;}
  .logo img{position:absolute;display:block;}
  .lg-o{left:0;top:0;width:27.55px;height:29.83px;}
  .lg-r{left:28.48px;top:4.55px;width:21.85px;height:25.19px;}
  .lg-f{left:53.56px;top:4.54px;width:18.65px;height:25.19px;}
  .lg-name{left:.28px;top:33.11px;width:71.21px;height:2.72px;}
</style>
</head>
<body>
  <!-- IAB/TTD clickTag: left BLANK in-creative; The Trade Desk injects the destination at serve time -->
  <script>var clickTag="";</script>
  <div class="banner" id="banner">
    <a target="_blank" rel="noopener">
      <div class="bg-gradient"></div>
      <div class="frame" data-frame>
        <div class="frame-img"><div class="frame-photo" style="background-image:url('assets/frame-1.jpg');background-position:50% 45%;"></div></div>
        <p class="headline">We&rsquo;re <span class="grad">upgrading</span> your airport</p>
      </div>
      <div class="frame" data-frame>
        <div class="frame-img"><div class="frame-photo" style="background-image:url('assets/frame-2.jpg');background-position:50% 45%;"></div></div>
        <p class="headline">to <span class="grad">elevate</span> your every day.</p>
      </div>
      <div class="frame" data-frame>
        <div class="frame-img"><div class="frame-photo" style="background-image:url('assets/frame-3.jpg');background-position:50% 45%;"></div></div>
        <p class="headline">Come fly <span class="grad">with us</span>.</p>
      </div>
      <div class="frame" data-frame>
        <div class="frame-img"><div class="frame-photo" style="background-image:url('assets/endcard.jpg');background-position:50% 30%;"></div></div>
        <img class="lockup" src="assets/lockup.svg" alt="Here &amp; There For You" />
      </div>

      <!-- constant background accents on top of frames? keep behind via z-order: lines drawn after frames so they sit above the photo edges -->
      <img class="line line-top" src="assets/bg-line-top.svg" alt="" />
      <img class="line line-b1" src="assets/bg-line-bottom-1.svg" alt="" />
      <img class="line line-b2" src="assets/bg-line-bottom-2.svg" alt="" />

      <div class="cta">Fly ORF</div>
      <div class="logo">
        <img class="lg-o" src="assets/mark-O.svg" alt="O" />
        <img class="lg-r" src="assets/mark-R.svg" alt="R" />
        <img class="lg-f" src="assets/mark-F.svg" alt="F" />
        <img class="lg-name" src="assets/mark-name.svg" alt="Norfolk International Airport" />
      </div>
    </a>
  </div>
  <script>
    (function(){(document.fonts?document.fonts.ready:Promise.resolve()).then(function(){[].forEach.call(document.querySelectorAll(".headline"),function(h){var fs=parseFloat(getComputedStyle(h).fontSize),g=0;while(h.scrollWidth>h.clientWidth+0.5&&fs>13&&g++<30){fs-=1;h.style.fontSize=fs+"px";}});});
      var HOLD=2200, LOOPS=1;
      var frames=[].slice.call(document.querySelectorAll(".frame"));
      var END=frames.length-1; var order=[];
      for(var l=0;l<LOOPS;l++) for(var i=0;i<END;i++) order.push(i);
      order.push(END);
      var step=0;
      function show(i){ frames.forEach(function(f,idx){ f.classList.toggle("active", idx===i); }); }
      function tick(){ show(order[step]); if(step<order.length-1){ step++; setTimeout(tick,HOLD); } }
      tick();
    })();
  </script>
  <script>(function(){var b=document.querySelector(".banner");if(b)b.addEventListener("click",function(){if(window.clickTag)window.open(window.clickTag,"_blank");});})();</script>
</body>
</html>
