<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="ad.size" content="width=970,height=250" />
<title>ORF — Here &amp; There For You — 970x250</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet" />
<style>
  /* =====================================================================
     NAA-105.01-HATFY2.0 · Display · 970x250 — MASTER BASELINE TEMPLATE
     Structure: N content frames {image + headline}  →  end card {image + lockup}
     Constant across all frames: background furniture, Fly ORF CTA, ORF logo.
     To add/replace a frame: drop assets/frame-N.jpg + edit its .frame block.
     ===================================================================== */
  :root{--navy:#0E374D;--green:#A1CE5E;--blue:#238DC1;--white:#fff;--sans:"Montserrat",Arial,sans-serif;}
  *{margin:0;padding:0;box-sizing:border-box;}
  .banner{position:relative;width:970px;height:250px;overflow:hidden;background:var(--navy);font-family:var(--sans);cursor:pointer;}
  .banner a{display:block;width:100%;height:100%;text-decoration:none;}

  /* ---- constant background furniture ---- */
  .bg-gradient{position:absolute;inset:0;
    background:
      radial-gradient(80% 160% at 88% 0%, rgba(37,140,192,.5) 0%, rgba(37,140,192,0) 55%),
      linear-gradient(150deg,#0E374D 45%,#09303f 100%);}
  .corner{position:absolute;height:251px;width:245px;pointer-events:none;}
  .corner-top{left:0;top:0;}
  .corner-bottom{left:725px;top:0;transform:rotate(180deg);}
  /* accent lines: gentle back-and-forth drift along their 45° axis, different speeds */
  .line{position:absolute;pointer-events:none;will-change:transform;}
  .line-top{left:21px;top:0;width:97px;height:97px;
    animation:drift-a 19s linear infinite alternate;}
  .line-b1{left:847px;top:147px;width:132px;height:132px;
    animation:drift-b 13s linear infinite alternate;}
  .line-b2{left:927px;top:95px;width:132px;height:132px;
    animation:drift-c 27s linear infinite alternate;}
  /* drift along the 45° axis the lines sit on: equal +x / -y */
  @keyframes drift-a{from{transform:translate(-60px,60px);}   to{transform:translate(150px,-150px);}}
  @keyframes drift-b{from{transform:translate(-130px,130px);} to{transform:translate(110px,-110px);}}
  @keyframes drift-c{from{transform:translate(-80px,80px) rotate(180deg);} to{transform:translate(170px,-170px) rotate(180deg);}}
  @media (prefers-reduced-motion:reduce){.line,.frame-photo{animation:none!important;}}

  /* ---- frames (each is an independent {image + headline}) ---- */
  .frame{position:absolute;inset:0;opacity:0;transition:opacity .6s ease-in-out;pointer-events:none;}
  .frame.active{opacity:1;}

  /* the photo band — same geometry every frame; image set per-frame inline */
  /* photo band — 45° diagonal cut (slant == height) */
  .frame-img{position:absolute;left:242px;top:0;width:600px;height:250px;overflow:hidden;
    -webkit-clip-path:polygon(250px 0,100% 0,calc(100% - 250px) 100%,0 100%);
    clip-path:polygon(250px 0,100% 0,calc(100% - 250px) 100%,0 100%);}
  /* inner photo: own image + subtle Ken Burns zoom while its frame is on stage.
     Starts at 105% and settles to 100% — end state == resting base, so no snap
     when the frame fades out. Duration == HOLD so it lands at 100% as it leaves. */
  .frame-photo{position:absolute;inset:0;background-repeat:no-repeat;background-size:cover;
    transform:scale(1);transform-origin:50% 50%;}
  .frame.active .frame-photo{animation:kenburns 2.2s linear forwards;}
  @keyframes kenburns{from{transform:scale(1.05);}to{transform:scale(1);}}
  .frame-img::after{content:"";position:absolute;inset:0;z-index:2;
    background:linear-gradient(105deg,
      rgba(14,55,77,.96) 6%, rgba(14,55,77,0) 30%,
      rgba(14,55,77,0) 58%, rgba(14,55,77,.96) 88%);}

  .headline{position:absolute;left:40px;top:50%;transform:translateY(-50%);width:441px;
    font-weight:600;font-size:50px;line-height:1.1;letter-spacing:-2px;color:var(--white);
    text-shadow:0 4px 10px rgba(0,0,0,.25);}
  .headline .grad{background:linear-gradient(116deg,#A1CD5D 45%,#2DAFF3 78%);
    -webkit-background-clip:text;background-clip:text;color:transparent;}
  .headline .nb{white-space:nowrap;}   /* keep multi-word place names on one line */

  /* ---- HATFY end-card lockup (outlined SVG from Figma — Effra Heavy) ---- */
  .lockup{position:absolute;left:40px;top:50%;transform:translateY(-50%);width:392px;height:130px;}

  /* ---- constant foreground: CTA + logo (on every frame) ---- */
  .cta{position:absolute;left:730px;top:77px;width:178px;height:44px;
    background:var(--green);border-radius:33px;display:flex;align-items:center;justify-content:center;
    font-weight:700;font-size:20px;color:var(--navy);box-shadow:0 3px 4px rgba(0,0,0,.25);white-space:nowrap;z-index:5;
    transition:background-color .2s ease;}
  .banner:hover .cta{background:var(--white);}   /* rollover: green -> white */
  .logo{position:absolute;left:702px;top:141px;width:233px;height:48px;z-index:5;}
  .logo img{width:100%;height:100%;display:block;}
</style>
</head>
<body>
  <!-- IAB/TTD clickTag: left BLANK in-creative; The Trade Desk injects the destination at serve time -->
  <script>var clickTag="";</script>
  <div class="banner" id="banner">
    <a target="_blank" rel="noopener">
      <!-- constant background -->
      <div class="bg-gradient"></div>
      <img class="corner corner-top" src="assets/bg-corner-top.svg" alt="" />
      <img class="corner corner-bottom" src="assets/bg-corner-bottom.svg" alt="" />
      <img class="line line-top" src="assets/bg-line-top.svg" alt="" />
      <img class="line line-b1" src="assets/bg-line-bottom-1.svg" alt="" />
      <img class="line line-b2" src="assets/bg-line-bottom-2.svg" alt="" />

      <!-- FRAME 1 (real copy) -->
      <div class="frame" data-frame>
        <div class="frame-img"><div class="frame-photo" style="background-image:url('assets/frame-1.jpg');background-position:50% 50%;"></div></div>
        <p class="headline" style="font-size:50px;">Everything we<br>do <span class="grad">here</span></p>
      </div>

      <!-- FRAME 2 (PLACEHOLDER — replace assets/frame-2.jpg + copy) -->
      <div class="frame" data-frame>
        <div class="frame-img"><div class="frame-photo" style="background-image:url('assets/frame-2.jpg');background-position:50% 50%;"></div></div>
        <p class="headline">makes getting <span class="grad">there</span>, easier.</p>
      </div>

      <!-- FRAME 3 (PLACEHOLDER — replace assets/frame-3.jpg + copy) -->
      <div class="frame" data-frame>
        <div class="frame-img"><div class="frame-photo" style="background-image:url('assets/frame-3.jpg');background-position:50% 50%;"></div></div>
        <p class="headline">Come fly <span class="grad">with us</span>.</p>
      </div>

      <!-- END CARD (resolves here, holds) -->
      <div class="frame" data-frame>
        <div class="frame-img"><div class="frame-photo" style="background-image:url('assets/endcard.jpg');background-position:50% 50%;"></div></div>
        <img class="lockup" src="assets/lockup.svg" alt="Here &amp; There For You" />
      </div>

      <!-- constant foreground -->
      <div class="cta">Fly ORF</div>
      <div class="logo"><img src="assets/orf-logo.svg" alt="ORF — Norfolk International Airport" /></div>
    </a>
  </div>

  <script>
    /* Sequence: play each content frame, loop the content set LOOPS times,
       then resolve to the end card and hold. Tune HOLD / LOOPS as needed. */
    (function(){(document.fonts?document.fonts.ready:Promise.resolve()).then(function(){[].forEach.call(document.querySelectorAll(".headline"),function(h){var fs=parseFloat(getComputedStyle(h).fontSize),g=0;while(h.scrollWidth>h.clientWidth+0.5&&fs>13&&g++<30){fs-=1;h.style.fontSize=fs+"px";}});});
      var HOLD = 2200;   // ms each frame is shown
      var LOOPS = 1;     // passes over the content frames before the end card
      var frames = [].slice.call(document.querySelectorAll(".frame"));
      var END = frames.length - 1;          // end card = last frame
      var order = [];
      for (var l = 0; l < LOOPS; l++)
        for (var i = 0; i < END; i++) order.push(i);
      order.push(END);                       // resolve to end card

      /* --- frame sequencer --- */
      var step = 0;
      function show(i){ frames.forEach(function(f,idx){ f.classList.toggle("active", idx===i); }); }
      function tick(){
        show(order[step]);
        if (step < order.length - 1){ step++; setTimeout(tick, HOLD); }
      }
      tick();
    })();
  </script>
  <script>(function(){var b=document.querySelector(".banner");if(b)b.addEventListener("click",function(){if(window.clickTag)window.open(window.clickTag,"_blank");});})();</script>
</body>
</html>
