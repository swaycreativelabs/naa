<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="ad.size" content="width=728,height=90" />
<title>ORF — Here &amp; There For You — 728x90</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet" />
<style>
  :root{--navy:#0E374D;--green:#A1CE5E;--blue:#238DC1;--white:#fff;--sans:"Montserrat",Arial,sans-serif;}
  *{margin:0;padding:0;box-sizing:border-box;}
  .banner{position:relative;width:728px;height:90px;overflow:hidden;background:var(--navy);font-family:var(--sans);cursor:pointer;}
  .banner a{display:block;width:100%;height:100%;text-decoration:none;}

  .bg-gradient{position:absolute;inset:0;
    background:radial-gradient(80% 180% at 90% 0%, rgba(37,140,192,.5) 0%, rgba(37,140,192,0) 55%),
      linear-gradient(150deg,#0E374D 45%,#09303f 100%);}
  .corner{position:absolute;height:91px;width:89px;pointer-events:none;}
  .corner-top{left:0;top:0;}
  .corner-bottom{left:639px;top:0;transform:rotate(180deg);}
  .line{position:absolute;pointer-events:none;will-change:transform;}
  .line-top{left:6px;top:-30px;width:97px;height:97px;animation:drift-a 19s linear infinite alternate;}
  .line-b1{left:659px;top:18px;width:85px;height:85px;animation:drift-b 13s linear infinite alternate;}
  .line-b2{left:723px;top:-12px;width:85px;height:85px;animation:drift-c 27s linear infinite alternate;}
  @keyframes drift-a{from{transform:translate(-30px,30px);}   to{transform:translate(80px,-80px);}}
  @keyframes drift-b{from{transform:translate(-70px,70px);}   to{transform:translate(60px,-60px);}}
  @keyframes drift-c{from{transform:translate(-40px,40px) rotate(180deg);} to{transform:translate(90px,-90px) rotate(180deg);}}
  @media (prefers-reduced-motion:reduce){.line,.frame-photo{animation:none!important;}}

  /* frames: each {image + headline}; end card {image + lockup} */
  .frame{position:absolute;inset:0;opacity:0;transition:opacity .6s ease-in-out;pointer-events:none;}
  .frame.active{opacity:1;}
  .frame-img{position:absolute;left:220px;top:0;width:339px;height:90px;overflow:hidden;
    -webkit-clip-path:polygon(90px 0,100% 0,calc(100% - 90px) 100%,0 100%);
    clip-path:polygon(90px 0,100% 0,calc(100% - 90px) 100%,0 100%);}
  .frame-photo{position:absolute;inset:0;background-repeat:no-repeat;background-size:cover;
    transform:scale(1);transform-origin:50% 50%;}
  .frame.active .frame-photo{animation:kenburns 2.2s linear forwards;}
  @keyframes kenburns{from{transform:scale(1.05);}to{transform:scale(1);}}
  .frame-img::after{content:"";position:absolute;inset:0;z-index:2;
    background:linear-gradient(105deg, rgba(14,55,77,.96) 12%, rgba(14,55,77,0) 38%,
      rgba(14,55,77,0) 60%, rgba(14,55,77,.96) 90%);}

  .headline{position:absolute;left:35px;top:50%;transform:translateY(-50%);width:260px;
    font-weight:600;font-size:26px;line-height:1.1;letter-spacing:-1px;color:var(--white);
    text-shadow:0 3px 8px rgba(0,0,0,.25);}
  .headline .grad{background:linear-gradient(116deg,#A1CD5D 45%,#2DAFF3 78%);
    -webkit-background-clip:text;background-clip:text;color:transparent;}
  .headline .nb{white-space:nowrap;}
  .headline.solo{white-space:nowrap;}   /* short headlines: one line at full size */

  .lockup{position:absolute;left:35px;top:50%;transform:translateY(-50%);width:224px;height:74px;}

  .cta{position:absolute;left:569px;top:14px;width:107px;height:25px;
    background:var(--green);border-radius:20px;display:flex;align-items:center;justify-content:center;
    font-weight:700;font-size:12px;color:var(--navy);box-shadow:0 2px 3px rgba(0,0,0,.25);white-space:nowrap;z-index:5;
    transition:background-color .2s ease;}
  .banner:hover .cta{background:var(--white);}
  .logo{position:absolute;left:558px;top:49px;width:130px;height:26.5px;z-index:5;}
  .logo img{width:100%;height:100%;display:block;}
</style>
</head>
<body>
  <!-- IAB/TTD clickTag: left BLANK in-creative; The Trade Desk injects the destination at serve time -->
  <script>var clickTag="";</script>
  <div class="banner" id="banner">
    <a target="_blank" rel="noopener">
      <div class="bg-gradient"></div>
      <img class="corner corner-top" src="assets/bg-corner-top.svg" alt="" />
      <img class="corner corner-bottom" src="assets/bg-corner-bottom.svg" alt="" />
      <img class="line line-top" src="assets/bg-line-top.svg" alt="" />
      <img class="line line-b1" src="assets/bg-line-bottom-1.svg" alt="" />
      <img class="line line-b2" src="assets/bg-line-bottom-2.svg" alt="" />

      <div class="frame" data-frame>
        <div class="frame-img"><div class="frame-photo" style="background-image:url('assets/frame-1.jpg');background-position:50% 50%;"></div></div>
        <p class="headline solo">Trade the <span class="grad">highway,</span></p>
      </div>
      <div class="frame" data-frame>
        <div class="frame-img"><div class="frame-photo" style="background-image:url('assets/frame-2.jpg');background-position:50% 50%;"></div></div>
        <p class="headline solo">for our <span class="grad">runway.</span></p>
      </div>
      <div class="frame" data-frame>
        <div class="frame-img"><div class="frame-photo" style="background-image:url('assets/frame-3.jpg');background-position:50% 50%;"></div></div>
        <p class="headline">Come fly <span class="grad">with us</span>.</p>
      </div>
      <div class="frame" data-frame>
        <div class="frame-img"><div class="frame-photo" style="background-image:url('assets/endcard.jpg');background-position:50% 10%;"></div></div>
        <img class="lockup" src="assets/lockup.svg" alt="Here &amp; There For You" />
      </div>

      <div class="cta">Fly ORF</div>
      <div class="logo"><img src="assets/orf-logo.svg" alt="ORF — Norfolk International Airport" /></div>
    </a>
  </div>
  <script>
    (function(){(document.fonts?document.fonts.ready:Promise.resolve()).then(function(){[].forEach.call(document.querySelectorAll(".headline"),function(h){h.style.whiteSpace="nowrap";if(h.scrollWidth>310){h.style.whiteSpace="normal";var fs=26;while(h.scrollWidth>h.clientWidth+0.5&&fs>14){fs--;h.style.fontSize=fs+"px";}}});});
      var HOLD=2200, LOOPS=1;
      var frames=[].slice.call(document.querySelectorAll(".frame"));
      var END=frames.length-1; var order=[];
      for(var l=0;l<LOOPS;l++) for(var i=0;i<END;i++) order.push(i);
      order.push(END);
      var step=0;
      function show(i){ frames.forEach(function(f,idx){ f.classList.toggle("active", idx===i); }); }
      function tick(){ show(order[step]); if(step<order.length-1){ step++; setTimeout(tick,HOLD); } }
      tick();
    })();
  </script>
  <script>(function(){var b=document.querySelector(".banner");if(b)b.addEventListener("click",function(){if(window.clickTag)window.open(window.clickTag,"_blank");});})();</script>
</body>
</html>
